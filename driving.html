<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driving License UI</title>
    <style>
        :root {
            --gov-blue: #003366;
            --license-gold: #b8860b;
            --bg-texture: #f0f4f7;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #cfd8dc;
            margin: 0;
        }

        /* Standard License Size */
        .license-card {
            width: 500px;
            height: 300px;
            background: linear-gradient(135deg, #ffffff 0%, #e3f2fd 100%);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid #999;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Subtle Watermark Effect */
        .license-card::before {
            content: "OFFICIAL";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 80px;
            color: rgba(0, 51, 102, 0.03);
            pointer-events: none;
            white-space: nowrap;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--gov-blue);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .state-name {
            color: var(--gov-blue);
            margin: 0;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .license-type {
            color: #d32f2f;
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
        }

        /* Main Content */
        .main {
            display: flex;
            gap: 20px;
        }

        .photo-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .photo {
            width: 120px;
            height: 150px;
            background-color: #ddd;
            border: 1px solid #888;
            background-image: url('https://via.placeholder.com/120x150?text=DRIVER+PHOTO');
            background-size: cover;
        }

        .ghost-photo {
            width: 40px;
            height: 50px;
            background-color: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
            filter: grayscale(100%) opacity(0.5);
        }

        /* Data Fields */
        .data-fields {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 9px;
            color: #555;
            font-weight: bold;
            text-transform: uppercase;
        }

        .value {
            font-size: 13px;
            color: #000;
            font-weight: bold;
        }

        .full-width {
            grid-column: span 2;
        }

        .dl-number {
            font-size: 18px;
            color: #d32f2f;
            letter-spacing: 1px;
        }

        /* Signature Area */
        .signature-area {
            margin-top: 15px;
            font-family: 'Brush Script MT', cursive;
            font-size: 20px;
            border-bottom: 1px solid #000;
            width: 150px;
        }

        .seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: rgba(184, 134, 11, 0.2);
            border: 2px dashed var(--license-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            text-align: center;
            color: var(--license-gold);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="license-card">
        <div class="header">
            <div>
                <h1 class="state-name">State Department</h1>
                <div class="license-type">DRIVER LICENSE - CLASS C</div>
            </div>
            <div style="text-align: right;">
                <span class="label">DL No.</span><br>
                <span class="value dl-number">WD123456789</span>
            </div>
        </div>

        <div class="main">
            <div class="photo-container">
                <div class="photo"></div>
                <div class="ghost-photo"></div>
            </div>

            <div class="data-fields">
                <div class="field full-width">
                    <span class="label">1. Surname</span>
                    <span class="value">Ragam</span>
                </div>
                <div class="field full-width">
                    <span class="label">2. Given Name</span>
                    <span class="value">Likhitha</span>
                </div>
                <div class="field full-width">
                    <span class="label">8. Address</span>
                    <span class="value">Nadargul,Ranga Reddy,501510</span>
                </div>
                <div class="field">
                    <span class="label">3. Date of Birth</span>
                    <span class="value">01/01/2000</span>
                </div>
                <div class="field">
                    <span class="label">4a. Issue Date</span>
                    <span class="value">02/09/2024</span>
                </div>
                <div class="field">
                    <span class="label">4b. Expiry Date</span>
                    <span class="value">02/09/2030</span>
                </div>
                <div class="field">
                    <span class="label">15. Sex</span>
                    <span class="value">Female</span>
                </div>
                
                <div class="field full-width">
                    <span class="label">Signature</span>
                    <div class="signature-area">Likhitha Ragam</div>
                </div>
            </div>
        </div>

        <div class="seal">OFFICIAL<br>GOVERNMENT<br>SEAL</div>
    </div>

</body>
</html>
