<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sample Student ID – Front</title>

<style>
body{
    background:#5f7f99;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* Card */
.id-card{
    width:320px;
    height:480px;
    background:#ffffff;
    margin:40px auto;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    overflow:hidden;
    position:relative;
}

/* Top section */
.top{
    background:#183a5a;
    height:180px;
    position:relative;
}

/* Diagonal design */
.top::after{
    content:"";
    position:absolute;
    bottom:-40px;
    left:0;
    width:100%;
    height:100px;
    background:linear-gradient(135deg,#6ec1ff,#e6f3ff);
    clip-path:polygon(0 0,100% 40%,100% 100%,0 100%);
}

/* School name at top */
.school-top{
    position:absolute;
    top:18px;
    left:18px;
    right:70px;
    color:#ffffff;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.6px;
    text-transform:uppercase;
}

/* Logo */
.logo{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    border:2px solid #f5b301;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#f5b301;
    font-weight:700;
}

/* Photo */
.photo{
    position:absolute;
    bottom:-55px;
    left:50%;
    transform:translateX(-50%);
    width:110px;
    height:110px;
    background:#1f3f5f;
    border-radius:50%;
    border:5px solid #f5b301;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#ffffff;
    font-weight:700;
}

/* Content */
.content{
    padding:70px 20px 20px;
    text-align:center;
}

/* Name & subtitle */
.name{
    font-size:20px;
    font-weight:800;
    margin:10px 0 4px;
    color:#183a5a;
}

.subtitle{
    font-size:13px;
    color:#555;
    margin-bottom:14px;
}

/* Details */
.details{
    text-align:left;
    font-size:13px;
    line-height:1.6;
}

.details span{
    font-weight:600;
    color:#183a5a;
}
</style>
</head>

<body>

<div class="id-card">

    <div class="top">
        <div class="school-top">MVSR Enngineering Collge</div>
        <div class="logo">LOGO</div>
        <div class="photo">PHOTO</div>
    </div>

    <div class="content">
        <div class="name">Ragam Likhitha</div>
        <div class="subtitle">AIML</div>

        <div class="details">
            <div><span>ID No:</span> 2451-23-748-026</div>
            <div><span>Course:</span> B.E CSE</div>
            <div><span>Phone:</span> +91 98765 4321</div>
            <div><span>Email:</span> 245123748026@mvsrec.edu.in</div>
        </div>
    </div>

</div>

</body>
</html>
