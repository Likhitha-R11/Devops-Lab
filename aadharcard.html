<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sample Aadhaar Card</title>

<style>
:root {
    --saffron: #ff9933;
    --green: #138808;
    --red: #d32f2f;
    --gray: #666;
}

body {
    margin: 0;
    padding: 0;
    background: #eef1f4;
    font-family: "Segoe UI", Arial, sans-serif;
}

/* Card */
.card {
    width: 880px;
    max-width: 95%;
    height: 560px;
    margin: 40px auto;
    background: #ffffff;
    border-radius: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
}

/* Watermark */
.watermark {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    font-weight: 800;
    color: rgba(255,0,0,0.12);
    transform: rotate(-25deg);
    pointer-events: none;
    user-select: none;
}

/* Header */
.header {
    background: linear-gradient(
        to right,
        var(--saffron),
        #ffffff,
        var(--green)
    );
    padding: 16px;
    text-align: center;
}

.header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 700;
}

.header h2 {
    margin: 4px 0 0;
    font-size: 17px;
    font-weight: 500;
}

/* Main content */
.content {
    display: flex;
    gap: 30px;
    padding: 30px 40px;
}

/* Photo */
.photo-box {
    width: 170px;
    height: 210px;
    border: 2px solid #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    color: var(--gray);
    background: #f7f7f7;
}

/* Details */
.details {
    flex: 1;
    font-size: 18px;
}

.detail-row {
    margin-bottom: 10px;
}

.label {
    font-weight: 600;
}

/* Aadhaar number */
.aadhaar-number {
    margin-top: 24px;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 6px;
}

/* Divider */
.divider {
    height: 4px;
    background: var(--red);
    margin: 0 30px;
}

/* Footer */
.footer {
    padding: 14px 20px;
    text-align: center;
    font-size: 20px;
    font-weight: 600;
}

/* Responsive */
@media (max-width: 600px) {
    .content {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .aadhaar-number {
        letter-spacing: 3px;
        font-size: 28px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="watermark">AADHAAR CARD</div>

    <div class="header">
        <h1>Government of India</h1>
        <h2>Unique Identification Authority of India</h2>
    </div>

    <div class="content">
        <div class="photo-box">PHOTO</div>

        <div class="details">
            <div class="detail-row">
                <span class="label">Name:</span> Likhitha Ragam
            </div>
            <div class="detail-row">
                <span class="label">DOB:</span> 01/06/2006
            </div>
            <div class="detail-row">
                <span class="label">Gender:</span> Female
            </div>

            <div class="aadhaar-number">
                1111&nbsp;2222&nbsp;3333
            </div>
        </div>
        
    </div>
     <!-- QR CODE -->
    <div class="qr-box">
        <div id="qrcode"></div>
    </div>

   </div>
    <div class="divider"></div>

    <div class="footer">
        आधार – आम आदमी का अधिकार
    </div>

</div>

</body>
</html>
